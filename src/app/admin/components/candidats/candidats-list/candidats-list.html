<div class="container mt-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-people"></i> Candidats ({{ (candidat$|async)?.length||0 }})</h2>
       <!-- <button class="btn btn-primary" (click)="openModal('add')">
          <i class="bi bi-plus-lg"></i> Ajouter
        </button>-->
      </div>
      <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
          <thead class="table-light">
            <tr>
              <th>ID</th>
              <th>Nom</th>
              <th>Prénom</th>
              <th>Email</th>
             <!--  <th>IDsession</th>
              <th>date début</th>
              <th>date fin</th>
              <th>formation</th> -->
              <!--<th class="text-end">Actions</th>-->
            </tr>
          </thead>
           <tbody>
            <tr *ngFor="let c of candidat$|async">
              <td>{{ c.id }}</td>
              <td>{{ c.nom }}</td>
              <td>{{ c.prenom }}</td>
              <td>{{ c.email }}</td>
             <!--  <td>{{ c.Session?.id }}</td>
              <td>{{ c.Session?.dateDebut }}</td>
              <td>{{ c.Session?.dateFin }}</td>
              <td>{{ c.Session?.formation?.titre || '—' }}</td> -->


             
             <!-- <td class="text-end">
                <button class="btn btn-sm btn-outline-primary me-1" (click)="openModal('edit', c)">
                  <i class="bi bi-pencil"></i>
                </button>
                <button class="btn btn-sm btn-outline-danger" (click)="remove(c.id!)">
                  <i class="bi bi-trash"></i>
                </button>
              </td>-->
            </tr>
            <tr *ngIf="(candidat$|async)?.length === 0">
              <td colspan="5" class="text-center text-muted py-4">
                <i class="bi bi-emoji-frown"></i> Aucun candidat
              </td>
            </tr>
          </tbody>
        </table>
      </div>
